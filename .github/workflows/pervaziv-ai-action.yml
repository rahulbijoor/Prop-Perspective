name: Pervaziv AI Code Review

on:
  push:
    branches:
      - main

jobs:
  pervaziv-ai-action:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: write
      pull-requests: write

    steps:
      - uses: pervaziv/pervaziv-ai-code-review@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          console-url: https://console.pervaziv.com
